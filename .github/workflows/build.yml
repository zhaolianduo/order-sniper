name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Show project structure
      run: |
        echo "=== Project files ==="
        find . -type f \( -name "*.gradle*" -o -name "AndroidManifest.xml" -o -name "settings.gradle" \) | head -20
        echo "=== Root build.gradle ==="
        cat build.gradle
        echo "=== settings.gradle ==="
        cat settings.gradle
        echo "=== app/build.gradle ==="
        cat app/build.gradle
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: |
        ./gradlew clean assembleDebug --stacktrace 2>&1
      shell: bash
    
    - name: Check build outputs
      run: |
        echo "=== Checking for APK ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        echo "=== Checking build directory ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK debug dir not found"
        echo "=== Checking all outputs ==="
        ls -la app/build/outputs/ 2>/dev/null || echo "outputs dir not found"
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
