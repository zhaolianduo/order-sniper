name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Show project structure
      run: |
        echo "=== Project files ==="
        find . -type f \( -name "*.gradle*" -o -name "AndroidManifest.xml" -o -name "settings.gradle" \) | head -20
        echo "=== Root build.gradle ==="
        cat build.gradle
        echo "=== settings.gradle ==="
        cat settings.gradle
        echo "=== app/build.gradle ==="
        cat app/build.gradle
    
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Check gradlew
      run: |
        echo "=== gradlew file info ==="
        ls -la gradlew
        file gradlew
        head -5 gradlew
        echo "=== gradle-wrapper.properties ==="
        cat gradle/wrapper/gradle-wrapper.properties
        echo "=== gradle-wrapper.jar info ==="
        ls -la gradle/wrapper/gradle-wrapper.jar
        file gradle/wrapper/gradle-wrapper.jar
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew && ls -la gradlew
    
    - name: Build debug APK
      run: |
        ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build.log
        echo "=== Gradle exit code: $? ==="
      shell: bash
    
    - name: Show build log on failure
      if: failure()
      run: |
        echo "=== Last 100 lines of build log ==="
        tail -100 build.log 2>/dev/null || echo "No build.log found"
        echo "=== app/build directory ==="
        ls -la app/build/ 2>/dev/null || echo "app/build not found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
